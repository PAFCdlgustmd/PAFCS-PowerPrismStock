<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAFC 재고 관리 (클라우드 실시간 연동)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#f4f6fa;min-height:100vh;padding:1.5rem;}
.app{max-width:780px;margin:0 auto;}
.topbar{background:#185FA5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{color:#E6F1FB;font-size:17px;font-weight:500;display:flex;align-items:center;gap:10px;}
.topbar-date{color:#85B7EB;font-size:12px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem;}
.sc{border-radius:8px;padding:12px 14px;}
.sc-blue{background:#E6F1FB;}.sc-green{background:#EAF3DE;}.sc-amber{background:#FAEEDA;}.sc-red{background:#FCEBEB;}
.sc-label{font-size:11px;font-weight:500;margin-bottom:4px;}
.sc-blue .sc-label{color:#185FA5;}.sc-green .sc-label{color:#3B6D11;}.sc-amber .sc-label{color:#854F0B;}.sc-red .sc-label{color:#A32D2D;}
.sc-val{font-size:22px;font-weight:500;}
.sc-blue .sc-val{color:#0C447C;}.sc-green .sc-val{color:#27500A;}.sc-amber .sc-val{color:#633806;}.sc-red .sc-val{color:#791F1F;}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;}
.tab{flex:1;padding:9px 0;text-align:center;font-size:13px;cursor:pointer;border-radius:8px;border:0.5px solid #B5D4F4;background:#E6F1FB;color:#185FA5;font-weight:500;}
.tab.active{background:#185FA5;color:#E6F1FB;border-color:#185FA5;}
.card{background:#fff;border:0.5px solid #ddd;border-radius:12px;overflow:hidden;margin-bottom:1.25rem;position:relative;}
.card-pad{padding:1rem 1.25rem;}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;}
th{padding:9px 10px;font-size:11px;font-weight:500;color:#185FA5;background:#E6F1FB;border-bottom:0.5px solid #B5D4F4;text-align:left;}
td{padding:10px;border-bottom:0.5px solid #eee;color:#222;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#E6F1FB;}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.b-ok{background:#EAF3DE;color:#3B6D11;}
.b-warn{background:#FAEEDA;color:#854F0B;}
.b-danger{background:#FCEBEB;color:#A32D2D;}
.b-in{background:#E1F5EE;color:#085041;}
.b-out{background:#FAECE7;color:#712B13;}
.sec-title{font-size:13px;font-weight:500;color:#185FA5;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.input-row{display:flex;gap:8px;margin-bottom:10px;}
.input-row input,.input-row select{flex:1;font-size:13px;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;outline:none;}
.site-wrap{flex:1;position:relative;display:flex;gap:6px;}
.site-wrap select{flex:1;font-size:13px;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;outline:none;}
.btn-add-site{background:#E6F1FB;color:#185FA5;border:0.5px solid #B5D4F4;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;white-space:nowrap;font-weight:500;}
.btn-reg{background:#185FA5;color:#E6F1FB;border:none;border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;white-space:nowrap;font-weight:500;}
.btn-del-site{background:#FCEBEB;color:#A32D2D;border:0.5px solid #F7C1C1;border-radius:8px;padding:8px 10px;font-size:13px;cursor:pointer;white-space:nowrap;}
.log-row{display:flex;gap:10px;padding:10px 0;border-bottom:0.5px solid #eee;font-size:13px;align-items:center;}
.log-row:last-child{border-bottom:none;}
.log-date{color:#888;font-size:11px;min-width:76px;}
.log-site{min-width:72px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.log-item{flex:1;}
.log-qty{min-width:36px;text-align:right;font-weight:500;color:#0C447C;}
.log-note{font-size:11px;color:#888;min-width:50px;overflow:hidden;text-overflow:ellipsis;}
.btn-log-del{background:#FCEBEB;color:#A32D2D;border:0.5px solid #F7C1C1;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;font-weight:500;}
.empty{text-align:center;padding:2rem;color:#888;font-size:13px;}
.filter-row{display:flex;gap:8px;margin-bottom:10px;}
.filter-row select{flex:1;font-size:13px;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;}
.msg-ok{color:#3B6D11;font-size:13px;margin-top:4px;}
.msg-err{color:#A32D2D;font-size:13px;margin-top:4px;}
.hidden{display:none;}
.new-site-row{display:flex;gap:6px;margin-bottom:10px;}
.new-site-row input{flex:1;font-size:13px;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;outline:none;}
.site-mgmt{background:#f8fafd;border:0.5px solid #B5D4F4;border-radius:8px;padding:10px 12px;margin-bottom:10px;}
.site-mgmt-title{font-size:12px;color:#185FA5;font-weight:500;margin-bottom:8px;}
.an-filter{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.an-filter select{flex:1;min-width:120px;font-size:13px;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;outline:none;}
.chart-wrap{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem;}
.chart-title{font-size:13px;font-weight:500;color:#185FA5;margin-bottom:12px;}
.chart-canvas{width:100%;height:240px;}
.an-table-wrap{background:#fff;border:0.5px solid #ddd;border-radius:12px;overflow:auto;margin-bottom:1.25rem;}
.an-table{width:100%;border-collapse:collapse;font-size:12px;}
.an-table th{padding:8px 10px;background:#E6F1FB;color:#185FA5;font-weight:500;border-bottom:0.5px solid #B5D4F4;text-align:center;white-space:nowrap;}
.an-table td{padding:8px 10px;border-bottom:0.5px solid #eee;text-align:center;color:#222;}
.an-table tr:last-child td{border-bottom:none;font-weight:500;background:#f8fafd;}
.an-table td:first-child{text-align:left;font-weight:500;}
.bulk-section { margin-top: 20px; border-top: 2px dashed #B5D4F4; padding-top: 20px; }
.bulk-textarea { width: 100%; height: 100px; padding: 10px; font-size: 12px; border: 1px solid #ccc; border-radius: 8px; font-family: monospace; resize: vertical; outline: none; }
.bulk-preview { max-height: 150px; overflow-y: auto; margin: 10px 0; font-size: 11px; background: #fafafa; border: 1px solid #eee; border-radius: 6px; }
.bulk-preview table { width: 100%; }
.bulk-preview th { background: #f0f4f8; padding: 6px; font-size: 11px; color: #555; }
.bulk-preview td { padding: 6px; border-bottom: 1px solid #f0f0f0; }
.btn-bulk-reg { background: #27500A; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; cursor: pointer; font-weight: bold; width: 100%; }
.log-tools { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
.log-filter-row-1 { display: flex; gap: 8px; width: 100%; }
.log-filter-row-2 { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.btn-clear-all { background: #A32D2D; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
.inv-tool-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.inv-year-label { font-size: 13px; color: #185FA5; font-weight: 500; display: flex; align-items: center; gap: 4px; }
.inv-year-select { font-size: 13px; padding: 6px 12px; border: 0.5px solid #ccc; border-radius: 8px; outline: none; background: #fff; color: #222; font-weight: 500; }
.cloud-bar { background: #FFF9E6; border: 1px solid #FFEBAA; color: #856404; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
.cloud-status { display: flex; align-items: center; gap: 6px; }
.btn-sync { background: #185FA5; color: #fff; border: none; border-radius: 4px; padding: 4px 8px; font-size: 11px; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-title"><i class="ti ti-cloud-computing"></i> PAFC 재고 관리 (클라우드 공유형)</div>
    <span class="topbar-date" id="today-date"></span>
  </div>

  <div class="cloud-bar" id="cloud-bar">
    <div class="cloud-status" id="cloud-status"><i class="ti ti-refresh-dot"></i> <span>클라우드 동기화 준비 중...</span></div>
    <button class="btn-sync" onclick="loadFromCloud()">수동 새로고침</button>
  </div>

  <div class="stats-grid" id="stats-grid">
    <div class="sc sc-blue"><div class="sc-label"><i class="ti ti-box"></i> 전체 재고</div><div class="sc-val" id="stat-total">0</div></div>
    <div class="sc sc-green"><div class="sc-label"><i class="ti ti-circle-check"></i> 정상 품목</div><div class="sc-val" id="stat-ok">0</div></div>
    <div class="sc sc-amber"><div class="sc-label"><i class="ti ti-alert-triangle"></i> 주의 품목</div><div class="sc-val" id="stat-warn">0</div></div>
    <div class="sc sc-red"><div class="sc-label"><i class="ti ti-alert-circle"></i> 부족 품목</div><div class="sc-val" id="stat-low">0</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('inventory')"><i class="ti ti-box"></i> 현재 재고</button>
    <button class="tab" onclick="showTab('inout')"><i class="ti ti-arrows-exchange"></i> 입출고</button>
    <button class="tab" onclick="showTab('log')"><i class="ti ti-list"></i> 이력</button>
    <button class="tab" onclick="showTab('analysis')"><i class="ti ti-chart-line"></i> 분석</button>
  </div>

  <div id="tab-inventory" class="">
    <div class="inv-tool-bar">
      <div class="inv-year-label"><i class="ti ti-calendar-event"></i> 보기 연도 설정:</div>
      <select id="inv-year-select" class="inv-year-select" onchange="renderInv()"></select>
    </div>
    <div class="card">
      <table>
        <thead><tr>
          <th style="width:34%">품목</th>
          <th style="width:16%">현재 재고</th>
          <th style="width:17%" id="th-year-in">올해 입고</th>
          <th style="width:17%" id="th-year-out">올해 출고</th>
          <th style="width:16%">상태</th>
        </tr></thead>
        <tbody id="inventory-tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-inout" class="hidden">
    <div class="card card-pad">
      <div class="sec-title"><i class="ti ti-plus"></i> 개별 입출고 등록</div>
      <div class="input-row">
        <select id="io-type"><option value="out">출고</option><option value="in">입고</option></select>
        <select id="io-item"><option value="">품목 선택</option></select>
        <div style="display:flex;gap:6px;">
          <input type="text" id="new-item-input" placeholder="새 품목명 입력">
          <button type="button" onclick="addItem()" style="background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;white-space:nowrap;">품목 추가</button>
        </div>
      </div>
      <div class="input-row">
        <select id="io-site-sel"><option value="">현장 선택</option></select>
        <input type="number" id="io-qty" placeholder="수량" min="1">
      </div>
      <div class="input-row">
        <input type="text" id="io-hogi" placeholder="호기 (예: 3호기, 없으면 비워둠)">
      </div>
      <div class="site-mgmt">
        <div class="site-mgmt-title"><i class="ti ti-building"></i> 현장 목록 관리</div>
        <div class="new-site-row">
          <input type="text" id="new-site-input" placeholder="새 현장명 입력">
          <button class="btn-add-site" onclick="addSite()">추가</button>
          <button class="btn-del-site" onclick="delSite()">선택삭제</button>
        </div>
      </div>
      <div class="input-row">
        <input type="text" id="io-date" placeholder="날짜 (YYYY-MM-DD)">
      </div>
      <div class="input-row">
        <input type="text" id="io-note" placeholder="비고 (선택)">
        <button class="btn-reg" onclick="registerIO()"><i class="ti ti-check"></i> 등록</button>
      </div>
      <div id="io-msg"></div>

      <div class="bulk-section">
        <div class="sec-title" style="color: #27500A;"><i class="ti ti-file-spreadsheet"></i> 엑셀 대량 붙여넣기 등록</div>
        <p style="font-size:11px; color:#666; margin-bottom:8px;">엑셀에서 <b>[ 날짜 | 현장명 | 호기 | 품목명 | 수량 ]</b> 순서대로 복사(Ctrl+C) 후 아래에 붙여넣으세요.</p>
        <textarea id="bulk-paste-area" class="bulk-textarea" placeholder="여기에 복사한 엑셀 셀 데이터를 붙여넣으세요..." oninput="previewBulkData()"></textarea>
        <div id="bulk-preview-wrap" class="bulk-preview hidden">
          <table>
            <thead><tr><th>구분</th><th>날짜</th><th>현장명</th><th>호기</th><th>품목명</th><th>수량</th></tr></thead>
            <tbody id="bulk-preview-tbody"></tbody>
          </table>
        </div>
        <div style="margin-top:10px;">
          <button class="btn-bulk-reg" onclick="registerBulk()"><i class="ti ti-table-import"></i> 대량 등록 실행 (<span id="bulk-count">0</span>건)</button>
        </div>
        <div id="bulk-msg"></div>
      </div>
    </div>
  </div>

  <div id="tab-log" class="hidden">
    <div class="log-tools">
      <div class="log-filter-row-1">
        <select id="log-filter-site" onchange="renderLog()"><option value="">전체 현장</option></select>
        <select id="log-filter-item" onchange="renderLog()"><option value="">전체 품목</option></select>
        <select id="log-filter-type" onchange="renderLog()"><option value="">전체 입출고</option><option value="in">입고만</option><option value="out">출고만</option></select>
      </div>
      <div class="log-filter-row-2">
        <select id="log-sort-order" onchange="renderLog()" style="font-size:13px; padding:8px 10px; border:0.5px solid #ccc; border-radius:8px; flex:1; max-width:200px;">
          <option value="desc">날짜 최신순</option>
          <option value="asc">날짜 과거순</option>
        </select>
        <button class="btn-clear-all" onclick="clearAllLogs()"><i class="ti ti-trash-x"></i> 이력 전체 초기화</button>
      </div>
    </div>
    <div class="card" style="padding:0 12px; max-height:600px; overflow-y:auto;"><div id="log-list"></div></div>
  </div>

  <div id="tab-analysis" class="hidden">
    <div class="an-filter">
      <select id="an-site" onchange="renderAnalysis()"><option value="">전체 현장</option></select>
      <select id="an-hogi" onchange="renderAnalysis()"><option value="">전체 호기</option></select>
      <select id="an-item" onchange="renderAnalysis()"><option value="">전체 품목</option></select>
      <select id="an-view" onchange="renderAnalysis()"><option value="site">현장별 출고량</option><option value="item">품목별 출고량</option><option value="trend">월별 추이</option></select>
    </div>
    <div class="chart-wrap">
      <div class="chart-title" id="an-chart-title">출고량 분석</div>
      <div class="chart-canvas"><canvas id="an-chart"></canvas></div>
    </div>
    <div class="an-table-wrap"><table class="an-table" id="an-table"></table></div>
  </div>
</div>

<script>
// ★★★ 구글 Apps Script 배포 후 받은 URL 주소를 아래에 붙여넣으세요 ★★★
const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyXb3Khwx78CRSZRQwJyhsH4rMR75_154xx5hO6ZNYYlVqDjiD3YjB4KhC1-v7GS7I/exec";

const BASE_ITEMS = ["레진(후지전기)", "레진(삼양사)", "물필터", "레진헤드", "집수봉", "활성탄필터", "마이크로필터", "인버터필터", "개질기필터", "GS-23", "GS-6", "방열팬"];
const BASE_SITES = ["아쿠아시티", "그린파크", "유일산업", "한사랑사우나", "선비사우나", "겐지스사우나", "미래개발원", "KT 대관령수련관", "두류수영장", "천호사우나", "중구수영장", "후지전기"];

let inv = BASE_ITEMS.map(name => ({name, current:0}));
let logs = [];
let sites = [...BASE_SITES];
let anChart = null;
let parsedRows = [];
const CHART_COLORS = ['#185FA5','#1D9E75','#D85A30','#BA7517','#993556','#534AB7','#639922','#A32D2D'];

function setStatus(text, type='process') {
  const bar = document.getElementById('cloud-bar');
  const status = document.getElementById('cloud-status');
  if(type==='error') {
    bar.style.background = '#FCEBEB'; bar.style.borderColor = '#F7C1C1'; status.style.color = '#A32D2D';
    status.innerHTML = `<i class="ti ti-cloud-off"></i> <span>${text}</span>`;
  } else if(type==='success') {
    bar.style.background = '#EAF3DE'; bar.style.borderColor = '#C1E09D'; status.style.color = '#3B6D11';
    status.innerHTML = `<i class="ti ti-cloud-lock"></i> <span>${text}</span>`;
  } else {
    bar.style.background = '#FFF9E6'; bar.style.borderColor = '#FFEBAA'; status.style.color = '#856404';
    status.innerHTML = `<i class="ti ti-refresh-dot"></i> <span>${text}</span>`;
  }
}

async function loadFromCloud() {
  if(!GOOGLE_WEB_APP_URL || GOOGLE_WEB_APP_URL.includes("붙여넣기")){
    setStatus("오류: 코드에 구글 웹 앱 URL 주소 입력이 누락되었습니다.", "error"); return;
  }
  setStatus("클라우드 최신 데이터 동기화 중...");
  try {
    const res = await fetch(`${GOOGLE_WEB_APP_URL}?action=read`);
    const data = await res.json();
    if(data.logs) logs = data.logs;
    if(data.sites && data.sites.length > 0) sites = data.sites;
    if(data.items && data.items.length > 0) inv = data.items.map(name => ({name, current:0}));
    
    updateYearOptions();
    populateSelects();
    renderInv();
    renderLog();
    setStatus("✓ 실시간 클라우드 연결 완료 (안전)", "success");
  } catch(e) {
    console.error(e); setStatus("동기화 실패: 구글 설정 혹은 인터넷 연결을 확인하세요.", "error");
  }
}

async function postToCloud(payload, successMsg) {
  try {
    setStatus("변경사항 클라우드 저장 중...");
    const res = await fetch(GOOGLE_WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify(payload),
      headers: { "Content-Type": "text/plain" }
    });
    const result = await res.json();
    if(result.status === "success") {
      await loadFromCloud();
      if(successMsg) alert(successMsg);
    } else { setStatus("저장 실패: 구글 에러 발생", "error"); }
  } catch(e) { console.error(e); setStatus("연결 실패: 클라우드 전송에 실패했습니다.", "error"); }
}

function updateYearOptions(){
  const select = document.getElementById('inv-year-select');
  const thisYear = new Date().getFullYear().toString();
  let years = new Set([thisYear, "2024", "2025", "2026", "2027"]);
  logs.forEach(l => { if(l.date) years.add(l.date.slice(0,4)); });
  const sorted = Array.from(years).sort((a,b)=>b-a);
  const prev = select.value;
  select.innerHTML = sorted.map(y=>`<option value="${y}">${y}년</option>`).join('');
  select.value = sorted.includes(prev) ? prev : thisYear;
}

function populateSelects(){
  const itemSel = document.getElementById('io-item');
  const logItem = document.getElementById('log-filter-item');
  const siteSel = document.getElementById('io-site-sel');
  const logSite = document.getElementById('log-filter-site');
  
  const itemVal = itemSel.value; const siteVal = siteSel.value;
  
  itemSel.innerHTML = '<option value="">품목 선택</option>' + inv.map(i=>`<option value="${i.name}">${i.name}</option>`).join('');
  logItem.innerHTML = '<option value="">전체 품목</option>' + inv.map(i=>`<option value="${i.name}">${i.name}</option>`).join('');
  siteSel.innerHTML = '<option value="">현장 선택</option>' + sites.map(s=>`<option value="${s}">${s}</option>`).join('');
  logSite.innerHTML = '<option value="">전체 현장</option>' + sites.map(s=>`<option value="${s}">${s}</option>`).join('');
  
  itemSel.value = itemVal; siteSel.value = siteVal;
}

function renderInv(){
  const year = document.getElementById('inv-year-select').value || new Date().getFullYear().toString();
  document.getElementById('th-year-in').textContent = `${year} 입고`;
  document.getElementById('th-year-out').textContent = `${year} 출고`;
  
  let totalStock = 0, okCnt = 0, warnCnt = 0, lowCnt = 0;
  
  const rows = inv.map(item => {
    const totalIn = logs.filter(l=>l.item===item.name && l.type==='in').reduce((a,l)=>a+l.qty,0);
    const totalOut = logs.filter(l=>l.item===item.name && l.type==='out').reduce((a,l)=>a+l.qty,0);
    const current = totalIn - totalOut;
    item.current = current;
    totalStock += current;
    
    if(current > 20) okCnt++; else if(current > 5) warnCnt++; else lowCnt++;
    
    const yIn = logs.filter(l=>l.item===item.name && l.type==='in' && l.date.startsWith(year)).reduce((a,l)=>a+l.qty,0);
    const yOut = logs.filter(l=>l.item===item.name && l.type==='out' && l.date.startsWith(year)).reduce((a,l)=>a+l.qty,0);
    
    let bClass = 'b-ok', bText = '정상';
    if(current <= 5) { bClass='b-danger'; bText='부족'; } else if(current <= 20) { bClass='b-warn'; bText='주의'; }
    
    return `<tr><td style="font-weight:500">${item.name}</td><td style="font-weight:500;color:#0C447C">${current}</td><td>${yIn}</td><td>${yOut}</td><td><span class="badge ${bClass}">${bText}</span></td></tr>`;
  }).join('');
  
  document.getElementById('inventory-tbody').innerHTML = rows;
  document.getElementById('stat-total').textContent = totalStock;
  document.getElementById('stat-ok').textContent = okCnt;
  document.getElementById('stat-warn').textContent = warnCnt;
  document.getElementById('stat-low').textContent = lowCnt;
}

async function addItem(){
  const input = document.getElementById('new-item-input'); const name = input.value.trim();
  if(!name){ alert('품목명을 입력하세요.'); return; }
  if(inv.find(i=>i.name===name)){ alert('이미 존재하는 품목입니다.'); return; }
  inv.push({name, current:0});
  populateSelects(); document.getElementById('io-item').value = name; input.value = '';
  await postToCloud({action:"syncMaster", items: inv.map(i=>i.name)});
}

async function addSite(){
  const input = document.getElementById('new-site-input'); const name = input.value.trim();
  if(!name){ alert('현장명을 입력하세요.'); return; }
  if(sites.includes(name)){ alert('이미 존재하는 현장입니다.'); return; }
  sites.push(name); populateSelects(); document.getElementById('io-site-sel').value = name; input.value = '';
  await postToCloud({action:"syncMaster", sites: sites});
}

async function delSite(){
  const name = document.getElementById('io-site-sel').value;
  if(!name){ alert('삭제할 현장을 목록에서 먼저 선택하세요.'); return; }
  if(!confirm(`"${name}" 현장을 삭제할까요? (기존 입출고 이력은 보존됩니다)`)) return;
  sites = sites.filter(s=>s!==name); populateSelects();
  await postToCloud({action:"syncMaster", sites: sites});
}

async function registerIO(){
  const type = document.getElementById('io-type').value; const item = document.getElementById('io-item').value;
  const site = document.getElementById('io-site-sel').value; const qty = parseInt(document.getElementById('io-qty').value);
  const hogi = document.getElementById('io-hogi').value.trim(); const date = document.getElementById('io-date').value.trim();
  const note = document.getElementById('io-note').value.trim(); const msg = document.getElementById('io-msg');
  
  if(!item || !site || !qty || qty < 1 || !date){ msg.className='msg-err'; msg.textContent='품목, 현장, 수량, 날짜를 바르게 입력하세요.'; return; }
  if(type==='out' && inv.find(i=>i.name===item).current < qty){ msg.className='msg-err'; msg.textContent='재고가 부족하여 출고할 수 없습니다.'; return; }
  
  const logData = [{ id: Date.now()+'-'+Math.floor(Math.random()*1000), date, type, item, site, hogi, qty, note }];
  msg.className='msg-ok'; msg.textContent='등록 완료!';
  document.getElementById('io-qty').value=''; document.getElementById('io-note').value=''; document.getElementById('io-hogi').value='';
  setTimeout(()=>msg.textContent='',2000);
  await postToCloud({action:"appendLog", logs: logData});
}

function previewBulkData(){
  const text = document.getElementById('bulk-paste-area').value; const tbody = document.getElementById('bulk-preview-tbody');
  const wrap = document.getElementById('bulk-preview-wrap'); const countSpan = document.getElementById('bulk-count');
  tbody.innerHTML = ''; parsedRows = [];
  if(!text.trim()){ wrap.classList.add('hidden'); countSpan.textContent='0'; return; }
  
  text.split('\n').forEach(line => {
    if(!line.trim()) return;
    const tokens = line.split('\t').map(t=>t.trim());
    if(tokens.length < 2) return;
    let date = tokens[0] || new Date().toISOString().slice(0,10);
    let site = tokens[1] || ''; let hogi = tokens[2]==='-'?'':(tokens[2]||'');
    let item = tokens[3] || ''; let qty = parseInt(tokens[4]?.replace(/[^0-9]/g, '')) || 0;
    let type = (site.includes('입고') || !site || site==='-') ? 'in' : 'out';
    if(item==='레진') item = '레진(후지전기)';
    if(site && item && qty > 0) {
      parsedRows.push({date, site, hogi, item, qty, type});
      tbody.innerHTML += `<tr><td><span class="badge ${type==='in'?'b-in':'b-out'}">${type==='in'?'입고':'출고'}</span></td><td>${date}</td><td>${site}</td><td>${hogi||'-'}</td><td>${item}</td><td>${qty}개</td></tr>`;
    }
  });
  if(parsedRows.length > 0){ wrap.classList.remove('hidden'); countSpan.textContent=parsedRows.length; }
  else { wrap.classList.add('hidden'); countSpan.textContent='0'; }
}

async function registerBulk(){
  if(parsedRows.length === 0){ alert('등록할 유효한 데이터가 없습니다.'); return; }
  if(!confirm(`총 ${parsedRows.length}건을 일괄 등록하시겠습니까?`)) return;
  const logData = parsedRows.map((row, i) => ({ id: (Date.now()+i)+'-'+Math.floor(Math.random()*10000), ...row }));
  document.getElementById('bulk-paste-area').value = ''; document.getElementById('bulk-preview-wrap').classList.add('hidden');
  document.getElementById('bulk-count').textContent='0'; parsedRows = [];
  await postToCloud({action:"appendLog", logs: logData}, "엑셀 대량 등록이 완벽히 저장되었습니다!");
}

function renderLog(){
  const site = document.getElementById('log-filter-site').value; const item = document.getElementById('log-filter-item').value;
  const type = document.getElementById('log-filter-type').value; const order = document.getElementById('log-sort-order').value;
  let filtered = logs.filter(l=> (!site||l.site===site) && (!item||l.item===item) && (!type||l.type===type));
  
  filtered.sort((a,b)=> order==='desc' ? new Date(b.date)-new Date(a.date) : new Date(a.date)-new Date(b.date));
  const container = document.getElementById('log-list');
  if(!filtered.length){ container.innerHTML='<p class="empty">이력이 없습니다.</p>'; return; }
  
  container.innerHTML = filtered.map(l=>`
    <div class="log-row">
      <span class="log-date">${l.date}</span>
      <span class="badge ${l.type==='in'?'b-in':'b-out'}">${l.type==='in'?'입고':'출고'}</span>
      <span class="log-site">${l.site}${l.hogi?' '+l.hogi:''}</span>
      <span class="log-item">${l.item}</span>
      <span class="log-qty">${l.qty}개</span>
      <span class="log-note">${l.note||''}</span>
      <button class="btn-log-del" onclick="deleteLog('${l.id}')">삭제</button>
    </div>
  `).join('');
}

async function deleteLog(id){
  if(!confirm("해당 한 건의 이력을 클라우드에서 영구 삭제하시겠습니까?")) return;
  await postToCloud({action:"deleteLog", id: id});
}

async function clearAllLogs(){
  if(!confirm("모든 데이터를 완전히 삭제하고 초기로 리셋하겠습니까? (복구 불가)")) return;
  await postToCloud({action:"clearAllLogs"});
}

function showTab(tab){
  ['inventory','inout','log','analysis'].forEach(t => document.getElementById('tab-'+t).classList.toggle('hidden', t!==tab));
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', ['inventory','inout','log','analysis'][i]===tab));
  if(tab==='inventory') renderInv();
  if(tab==='log') renderLog();
  if(tab==='analysis') {
    const siteSel = document.getElementById('an-site'); const itemSel = document.getElementById('an-item'); const hogiSel = document.getElementById('an-hogi');
    siteSel.innerHTML = '<option value="">전체 현장</option>' + sites.map(s=>`<option value="${s}">${s}</option>`).join('');
    itemSel.innerHTML = '<option value="">전체 품목</option>' + inv.map(i=>`<option value="${i.name}">${i.name}</option>`).join('');
    const hogis = [...new Set(logs.filter(l=>l.hogi).map(l=>l.hogi))].sort();
    hogiSel.innerHTML = '<option value="">전체 호기</option>' + hogis.map(h=>`<option value="${h}">${h}</option>`).join('');
    renderAnalysis();
  }
}

function renderAnalysis(){
  const site = document.getElementById('an-site').value; const hogi = document.getElementById('an-hogi').value;
  const item = document.getElementById('an-item').value; const view = document.getElementById('an-view').value;
  const outLogs = logs.filter(l=> l.type==='out' && (!site||l.site===site) && (!hogi||l.hogi===hogi) && (!item||l.item===item));
  if(anChart) anChart.destroy();
  
  const ctx = document.getElementById('an-chart').getContext('2d');
  let map = {}, labels = [], values = [];
  
  if(view==='site'){
    document.getElementById('an-chart-title').textContent = '현장별 출고량';
    outLogs.forEach(l=> map[l.site] = (map[l.site]||0)+l.qty);
    labels = Object.keys(map).sort((a,b)=>map[b]-map[a]); values = labels.map(l=>map[l]);
    anChart = new Chart(ctx, {type:'bar', data:{labels, datasets:[{data:values, backgroundColor:'#185FA5'}]}});
    document.getElementById('an-table').innerHTML = '<tr><th>현장</th><th>출고량</th></tr>'+labels.map(l=>`<tr><td>${l}</td><td>${map[l]}개</td></tr>`).join('');
  } else if(view==='item') {
    document.getElementById('an-chart-title').textContent = '품목별 출고량';
    outLogs.forEach(l=> map[l.item] = (map[l.item]||0)+l.qty);
    labels = Object.keys(map).sort((a,b)=>map[b]-map[a]); values = labels.map(l=>map[l]);
    anChart = new Chart(ctx, {type:'bar', data:{labels, datasets:[{data:values, backgroundColor:'#1D9E75'}]}});
    document.getElementById('an-table').innerHTML = '<tr><th>품목</th><th>출고량</th></tr>'+labels.map(l=>`<tr><td>${l}</td><td>${map[l]}개</td></tr>`).join('');
  } else {
    document.getElementById('an-chart-title').textContent = '월별 출고 추이';
    outLogs.forEach(l=> { const m = l.date.slice(0,7); map[m] = (map[m]||0)+l.qty; });
    labels = Object.keys(map).sort(); values = labels.map(l=>map[l]);
    anChart = new Chart(ctx, {type:'line', data:{labels, datasets:[{label:'출고량', data:values, borderColor:'#D85A30', fill:false}]}});
    document.getElementById('an-table').innerHTML = '<tr><th>월별</th><th>출고량</th></tr>'+labels.map(l=>`<tr><td>${l}</td><td>${map[l]}개</td></tr>`).join('');
  }
}

// 초기화 세팅
document.getElementById('today-date').textContent = new Date().toLocaleDateString('ko-KR');
document.getElementById('io-date').value = new Date().toISOString().slice(0,10);
loadFromCloud();
</script>
